<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>缪缪跳跃</title>
    <style>
        @font-face {
            font-family: 'AlibabaPuHuiTi-Regular';
            src: url('fonts/AlibabaPuHuiTi-3-55-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'AlibabaPuHuiTi-Bold';
            src: url('fonts/AlibabaPuHuiTi-3-85-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'ArchitectsDaughter';
            src: url('fonts/ArchitectsDaughter.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'AlibabaPuHuiTi-Regular', 'Segoe UI', Roboto, sans-serif;
        }
        .btn, .menu-title, .hud, .overlay h2, .overlay p {
            font-family: 'AlibabaPuHuiTi-Bold', 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f3e6 0%, #e4e8d4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px 8px;
        }
        /* 画布区域 */
        .canvas-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #3e5068;
            background: #0f172a;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 20%, #f4f4da, #e9ead9);
            touch-action: none;  /* 禁止默认滚动 */
        }
        /* 覆盖层 (主菜单/记录/关于/弹窗) */
        .overlay {
            z-index: 10;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            color: white;
            text-shadow: 2px 2px 0 #1e2b3c;
            padding: 20px;
            border-radius: 20px;
            transition: opacity 0.2s;
        }
        .overlay.hidden {
            display: none;
        }
        .menu-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fdd835, #ffb300);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }
        .btn {
            background: #2e4c6b;
            border: none;
            border-radius: 60px;
            padding: 14px 36px;
            font-size: 22px;
            font-weight: bold;
            color: #ecf0f3;
            box-shadow: 0 8px 0 #0f1a24, 0 4px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            min-width: 180px;
            text-align: center;
            transition: all 0.08s;
            border: 1px solid #5f7f9f;
            letter-spacing: 2px;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #0f1a24, 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn.small {
            font-size: 18px;
            padding: 10px 24px;
            min-width: 140px;
        }

        /* 底部按钮禁用状态样式 */
        .btn.small.disabled {
            background: #6a7a8a;          /* 平面灰色 */
            box-shadow: none;             /* 去除立体阴影 */
            transform: none;             /* 禁止按下位移 */
            border: 1px solid #8a9aaa;   /* 浅色边框 */
            color: #c0c8d0;              /* 文字变淡 */
            cursor: not-allowed;         /* 禁用光标 */
            pointer-events: none;        /* 阻止点击事件（可选，JS已做判断） */
            opacity: 0.7;
        }

        /* 移除禁用按钮的按下动画 */
        .btn.small.disabled:active {
            transform: none;
            box-shadow: none;
        }

        .record-table {
            width: 90%;
            max-height: 280px;
            overflow-y: auto;
            background: #1e2f3ecc;
            border-radius: 16px;
            padding: 8px 6px;
            margin: 10px 0;
            backdrop-filter: blur(2px);
            border: 1px solid #6c8da8;
        }
        .record-table table {
            width: 100%;
            border-collapse: collapse;
            color: #f0f4fa;
            font-size: 14px;
        }
        .record-table th {
            background: #2d4b63;
            padding: 10px 4px;
            font-weight: 600;
            border-bottom: 2px solid #8ab3d0;
        }
        .record-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #506b80;
            text-align: center;
        }
        .about-text {
            background: #1f3542dd;
            padding: 20px 18px;
            border-radius: 20px;
            max-width: 380px;
            font-size: 16px;
            line-height: 1.6;
            border-left: 6px solid #ffb300;
            border-right: 6px solid #ffb300;
            text-align: center;
        }
        .close-icon {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #eee;
            cursor: pointer;
            opacity: 0.8;
        }
        /* 游戏内HUD */
        .hud {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 18px;
            pointer-events: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black;
        }

        /* 评级颜色与发光 */
        .rating-D { color: #6e6e6e; text-shadow: none; }
        .rating-C { color: #6ebeff; text-shadow: none; }
        .rating-B { color: #82ff88; text-shadow: none; }
        .rating-A { color: #ff89b0; text-shadow: none; }
        .rating-S { 
            color: #ffb300; 
            animation: glowPulse 1.5s infinite alternate;
        }
        .rating-SS { 
            color: #e0e0e0; 
            animation: glowPulse 1.2s infinite alternate;
        }
        .rating-SSS { 
            color: #ffd700; 
            animation: glowPulse 0.9s infinite alternate;
        }
        @keyframes glowPulse {
            from { 
                text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black,
                             0 0 5px currentColor, 0 0 10px currentColor; 
            }
            to { 
                text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black,
                             0 0 15px currentColor, 0 0 25px currentColor; 
            }
        }
        .rating-D, .rating-C, .rating-B, .rating-A {
            text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black;
        }
        /* 进度条描边颜色随评级变化（通过JS动态设置边框颜色） */

        .lives span {
            color: #ff5e57;
            margin-right: 6px;
        }
        /* 暂停标志 */
        .pause-badge {
            z-index: 5;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            color: rgba(255,255,240,0.7);
            text-shadow: 4px 4px 0 #00000050;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
        .pause-badge.show {
            display: block; /* 需要显示时添加此类 */
        }
        /* 底部按钮栏（游戏内） */
        .game-footer {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .error-message {
            color: #ff9e8f;
            background: #2d1b1b;
            padding: 16px;
            border-radius: 20px;
            border: 2px solid #d32f2f;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

         <!-- HUD (游戏内) -->
         <div class="hud" id="gameHUD" style="display: none; position: absolute; top: 0; left: 0; right: 0; pointer-events: none;">
            <!-- 进度条：距离顶部10px，厚度10px -->
            <div style="position: absolute; top: 10px; left: 18px; right: 18px; height: 10px; background: #1e2b3c; border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px #000; border: 2px solid #888;" id="progressBarContainer">
                <div id="scoreProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #9e9e9e, #757575); transition: width 0.15s, background 0.3s;"></div>
            </div>
            <!-- 血量（左） 评级（中） 分数（右） -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 18px; margin-top: 20px; width: 100%; box-sizing: border-box;">
                <div class="lives" style="font-family: 'AlibabaPuHuiTi-Bold'; flex: 1; text-align: left; white-space: nowrap;">❤️ <span id="lifeDisplay">3</span></div>
                <div id="ratingDisplay" style="font-family: 'ArchitectsDaughter'; font-size: 26px; width: 80px; text-align: center; text-shadow: -1px -1px 0 black, 1px -1px 0 black, -1px 1px 0 black, 1px 1px 0 black, 0 0 5px currentColor; white-space: nowrap;">D</div>
                <div style="font-family: 'AlibabaPuHuiTi-Regular'; flex: 1; text-align: right; white-space: nowrap;">得分：<span id="scoreDisplay">0</span></div>
            </div>
        </div>
        <div class="pause-badge" id="pauseBadge">⏸️</div>

        <!-- 主菜单覆盖层 -->
        <div id="mainMenuOverlay" class="overlay">
            <div class="menu-title">缪缪跳跃</div>
            <button class="btn" id="startBtn">开始</button>
            <button class="btn" id="recordBtn">游玩记录</button>
            <button class="btn" id="aboutBtn">关于</button>
        </div>

        <!-- 游玩记录覆盖层 -->
        <div id="recordOverlay" class="overlay hidden">
            <span class="close-icon" id="closeRecordBtn">✕</span>
            <h2 style="font-family: 'AlibabaPuHuiTi-Bold'; font-size: 40px; margin-top: 10px;">游玩记录</h2>
            <div class="record-table" id="recordTableContainer">
                <table>
                <thead><tr><th>时间</th><th>分数</th><th>评级</th></tr></thead>
                <tbody id="recordTableBody"></tbody>
                </table>
            </div>
            <button class="btn small" id="backFromRecordBtn">返回</button>
        </div>

        <!-- 关于覆盖层 -->
        <div id="aboutOverlay" class="overlay hidden">
            <span class="close-icon" id="closeAboutBtn">✕</span>
            <h2 style="font-family: 'AlibabaPuHuiTi-Bold'; font-size: 30px;">关 于</h2>
            <div class="about-text">
                缪缪跳跃<br>
                <br>
                拖拽缪缪左右移动，自动跳跃。<br>
                <br>
                多萝西的地雷：跳的更高！<br>
                动力装甲：芜湖！起飞！<br>
                赛雷娅的盾牌：抵挡一次龙卷风！<br>
                缪缪的流形：增加一次机会！<br>
                <br>
                躲避陷阱，看缪缪能跳多高！<br>
                <button id="authorLinkBtn" style="background: none; border: 2px solid #ffb300; border-radius: 30px; padding: 8px 24px; color: #ffd966; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;">作者：风雅荷 Bilibili</button>
            </div>
            <button class="btn small" id="backFromAboutBtn">返回</button>
        </div>

        <!-- 通关弹窗 -->
        <div id="victoryOverlay" class="overlay hidden">
            <h2 style="font-size: 48px; color: #FFD966;">游戏通关</h2>
            <p style="font-size: 24px; margin: 5px;">分数 <span id="victoryScore">0</span></p>
            <button class="btn" id="continueBtn">继续</button>
            <button class="btn" id="restartFromVictoryBtn">重新开始</button>
            <button class="btn" id="backFromVictoryBtn">返回</button>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="gameoverOverlay" class="overlay hidden">
            <h2 style="font-size: 48px; color: #e06c75;">游戏结束</h2>
            <p style="font-size: 24px;">分数 <span id="gameoverScore">0</span></p>
            <button class="btn" id="restartFromOverBtn">重新开始</button>
            <button class="btn" id="backFromOverBtn">返回</button>
        </div>
    </div>

    <!-- 游戏内底部按钮（仅在游戏运行时显示） -->
    <div class="game-footer" id="gameFooter" style="display: none;">
        <button class="btn small" id="pauseToggleBtn">暂停</button>
        <button class="btn small" id="gameRecordBtn">记录</button>
        <button class="btn small" id="gameAboutBtn">关于</button>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 全局配置 ----------
        const CONFIG = {
            CANVAS_W: 400,
            CANVAS_H: 600,
            PLAYER_W: 48,            // 渲染宽度
            PLAYER_H: 48,           // 渲染高度
            PLAYER_COLLISION_W: 20, // 碰撞箱宽度（新增）
            PLAYER_COLLISION_H: 48, // 碰撞箱高度（新增）
            PLATFORM_W: 60,
            PLATFORM_H: 10,
            PLATFORM_RADIUS: 4,
            STROKE_WIDTH: 3,
            GRAVITY: 0.5,
            JUMP_FORCE: -15,        // 自动跳跃初速度
            MAX_FALL_SPEED: 12,
            PLAYER_SMOOTH_SPEED: 0.25, // 平滑跟随系数
            TRAP_SIZE: 48,
            TRAP_DAMAGE: 1,
            INVINCIBLE_DURATION: 120,  // 2秒 (60fps)
            SCROLL_THRESHOLD: 300,     // 玩家Y < 300时开始滚动
            PLATFORM_INTERVAL_MIN: 50,
            PLATFORM_INTERVAL_MAX: 70,
            MIN_PLATFORM_GAP: 30,
            MAX_MOVING_RANGE_X: 300,
            MAX_MOVING_RANGE_Y: 150,
            WIN_SCORE: 1000,
            PLAYER_IMG_PATH: 'images/player.png',
        };

        // 平台类型
        const PLATFORM_TYPE = {
            FIXED: 'fixed',
            ONETIME: 'onetime',
            MOVING: 'moving',
            MOVING_ONETIME: 'moving_onetime',
        };

        // 游戏状态
        const GAME_STATE = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAMEOVER: 'gameover',
            VICTORY: 'victory',
        };

        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameHUD = document.getElementById('gameHUD');
        const pauseBadge = document.getElementById('pauseBadge');
        const lifeDisplay = document.getElementById('lifeDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        
        // 覆盖层
        const mainMenuOverlay = document.getElementById('mainMenuOverlay');
        const recordOverlay = document.getElementById('recordOverlay');
        const aboutOverlay = document.getElementById('aboutOverlay');
        const victoryOverlay = document.getElementById('victoryOverlay');
        const gameoverOverlay = document.getElementById('gameoverOverlay');
        
        const gameFooter = document.getElementById('gameFooter');
        const pauseToggleBtn = document.getElementById('pauseToggleBtn');

        // 记录表
        const recordTableBody = document.getElementById('recordTableBody');

        // ---------- 游戏核心变量 ----------
        let gameState = GAME_STATE.MENU;
        let playerImage = null;
        let imageLoadFailed = false;
        let gameRecorded = false;

        // 玩家属性
        let player = {
            x: 200, y: 500,
            vx: 0, vy: 0,
            width: CONFIG.PLAYER_W,
            height: CONFIG.PLAYER_H,
            targetX: 200,
            lives: 3,
            invincible: 0,        // 无敌帧计数
        };

        // 道具类型常量
        const ITEM_TYPE = {
            JUMP_BOOST: 1,      // 下次跳跃初速度加倍
            FLIGHT: 2,          // 向上飞行3秒
            SHIELD: 3,          // 护盾，抵挡一次陷阱伤害
            LIFE_UP: 4          // 生命+1
        };

        // 道具数组
        let items = [];

        // 道具图片对象，使用类型常量作为键
        let itemImages = {};
        let playerItem2Image = null;   // images/player_item_2.png
        let playerItem3Image = null;   // images/player_item_3.png

        // 世界数据
        let platforms = [];
        let traps = [];
        let cameraY = 0;           // 相机偏移(累计滚动量)
        let highestY = 0;          // 玩家达到的最高点(用于分数)
        let score = 0;
        let gameOverReason = '';
        let victoryTriggered = false;  // 是否已触发通关弹窗
        let victoryShown = false; // 防止 victoryOverlay 重复显示
        let continueMode = false;      // 通关后继续不检测通关

        // 生成控制
        let nextPlatformY = 500;    // 下一个平台生成的世界Y坐标
        let platformSpawnBaseY = 500;
        // 特殊平台类型动态权重（键为类型代码 2/3/4，值为当前权重）
        let specialTypeWeights = { 2: 1, 3: 1, 4: 1 };

        // 平台类型预生成队列
        let platformTypeQueue = [];          // 存储平台类型代码 (1-4)
        const QUEUE_MIN_LENGTH = 200;       // 队列最小长度，低于此值则追加
        let lastQueueScore = 0;             // 上次生成队列时的分数，用于判断是否需要重新计算比例

        // 特殊内容生成控制
        let nextTrapSpawnY = 0;          // 下一个陷阱尝试生成的世界Y坐标
        const TRAP_SPAWN_INTERVAL = 60;  // 陷阱生成检查间隔（像素）
        let trapSpawnCooldown = 0;          // 陷阱生成冷却帧数
        const TRAP_SPAWN_COOLDOWN_MAX = 30; // 生成一个陷阱后等待30帧再允许生成下一个

        // 移动平台参数
        let movingPlatforms = [];

        // 拖动交互
        let isDragging = false;
        let lastDragX = 0;

        // 暂停标记
        let gameLoopId = null;
        let lastTimestamp = 0;          // 上一帧的时间戳
        const FIXED_TIMESTEP = 1000 / 60; // 目标每帧时长（毫秒），即60FPS的16.67ms
        let accumulator = 0;            // 累积时间差

        // 陷阱动画图片
        let trapImage1 = null;
        let trapImage2 = null;
        let trapFrame = 0;           // 当前帧 0 或 1
        let lastTrapFrameTime = 0;   // 上次帧切换时间
        const TRAP_FRAME_INTERVAL = 100; // 毫秒

        // ---------- 辅助函数 ----------
        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function rectCollide(r1, r2) {
            return r1.x < r2.x + r2.width &&
                r1.x + r1.w > r2.x &&
                r1.y < r2.y + r2.height &&
                r1.y + r1.h > r2.y;
        }

        // 检查图片是否可绘制
        function isImageValid(img) {
            return img && img.complete && img.naturalWidth > 0 && img.naturalHeight > 0;
        }

        // 检测矩形与倒立等腰三角形是否碰撞
        // rect: { x, y, w, h } 玩家碰撞箱
        // trap:  { x, y, width, height } 陷阱图片边界
        function rectTriangleCollide(rect, trap) {
            // 三角形参数：底边为图片宽度，高为图片高度的2/3，倒立，靠下对齐
            const triBase = trap.width;
            const triHeight = trap.height * 2 / 3;
            const triTopY = trap.y + trap.height - triHeight; // 三角形顶点Y（靠下，所以顶部Y靠下）
            const triBottomY = trap.y + trap.height;          // 底边Y（图片底部）
            const triCenterX = trap.x + trap.width / 2;
            
            // 三角形三条边的直线方程（用于半平面测试）
            // 左腰：从 (triCenterX - triBase/2, triBottomY) 到 (triCenterX, triTopY)
            // 右腰：从 (triCenterX, triTopY) 到 (triCenterX + triBase/2, triBottomY)
            // 底边：水平线 y = triBottomY
            
            // 首先粗略排除：矩形与三角形包围盒不相交
            const triMinX = triCenterX - triBase/2;
            const triMaxX = triCenterX + triBase/2;
            const triMinY = triTopY;
            const triMaxY = triBottomY;
            
            if (rect.x + rect.w < triMinX || rect.x > triMaxX ||
                rect.y + rect.h < triMinY || rect.y > triMaxY) {
                return false;
            }
            
            // 精确检测：矩形的四个角点是否在三角形内，或者三角形顶点在矩形内
            // 简化为采样矩形四个角点 + 中心点，判断是否在三角形内
            const samplePoints = [
                { x: rect.x, y: rect.y },
                { x: rect.x + rect.w, y: rect.y },
                { x: rect.x, y: rect.y + rect.h },
                { x: rect.x + rect.w, y: rect.y + rect.h },
                { x: rect.x + rect.w/2, y: rect.y + rect.h/2 }
            ];
            
            // 判断点是否在倒立等腰三角形内的辅助函数
            function pointInTriangle(px, py) {
                // 首先检查是否在底边以上
                if (py > triBottomY) return false;
                if (py < triTopY) return false;
                
                // 根据高度计算当前y对应的半宽
                const t = (py - triTopY) / triHeight; // 0在顶点，1在底边
                const halfWidth = (triBase / 2) * t;
                const leftBound = triCenterX - halfWidth;
                const rightBound = triCenterX + halfWidth;
                
                return px >= leftBound && px <= rightBound;
            }
            
            // 检查采样点
            for (let p of samplePoints) {
                if (pointInTriangle(p.x, p.y)) {
                    return true;
                }
            }
            
            // 额外检查：三角形的三个顶点是否在矩形内
            const triVertices = [
                { x: triCenterX - triBase/2, y: triBottomY },
                { x: triCenterX + triBase/2, y: triBottomY },
                { x: triCenterX, y: triTopY }
            ];
            for (let v of triVertices) {
                if (v.x >= rect.x && v.x <= rect.x + rect.w &&
                    v.y >= rect.y && v.y <= rect.y + rect.h) {
                    return true;
                }
            }
            
            return false;
        }

        // 评级计算及颜色（返回评级文字、颜色值）
        function calculateRating(scoreVal) {
            const percent = scoreVal / CONFIG.WIN_SCORE;
            if (percent >= 1.0) return { rating: 'SSS', color: '#ffd700' };
            if (percent >= 0.7) return { rating: 'SS', color: '#e0e0e0' };
            if (percent >= 0.5) return { rating: 'S', color: '#ffb300' };
            if (percent >= 0.3) return { rating: 'A', color: '#f06292' };
            if (percent >= 0.2) return { rating: 'B', color: '#66bb6a' };
            if (percent >= 0.1) return { rating: 'C', color: '#42a5f5' };
            return { rating: 'D', color: '#9e9e9e' };
        }

        // 记录游玩记录
        function addPlayRecord(finalScore) {
            try {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
                const fullTime = `${dateStr} ${timeStr}`;
                const integerScore = Math.floor(finalScore);
                const { rating } = calculateRating(integerScore);
                const record = { time: fullTime, score: integerScore, rating };
                
                let records = JSON.parse(localStorage.getItem('jumper_records') || '[]');
                records.unshift(record);
                if (records.length > 20) records.pop();
                localStorage.setItem('jumper_records', JSON.stringify(records));
                renderRecordTable();
            } catch (e) {
                // 存储失败时静默忽略，避免打断游戏主循环
                console.warn('记录保存失败（可能存储已满或处于隐私模式）', e);
            }

        // 根据刚生成的类型更新特殊平台权重
        function updateSpecialTypeWeights(generatedType) {
            // 仅处理特殊类型（2/3/4）
            if (generatedType < 2 || generatedType > 4) return;
            
            // 将其他类型的权重乘以4
            for (let type in specialTypeWeights) {
                if (parseInt(type) !== generatedType) {
                    specialTypeWeights[type] *= 4;
                }
            }
            
            // 计算最大公约数并约分
            const values = Object.values(specialTypeWeights);
            const gcd = findGCDOfArray(values);
            if (gcd > 1) {
                for (let type in specialTypeWeights) {
                    specialTypeWeights[type] /= gcd;
                }
            }
        }

        // 求多个数的最大公约数
        function findGCDOfArray(arr) {
            let result = arr[0];
            for (let i = 1; i < arr.length; i++) {
                result = findGCD(result, arr[i]);
                if (result === 1) break;
            }
            return result;
        }

        function findGCD(a, b) {
            while (b !== 0) {
                let t = b;
                b = a % b;
                a = t;
            }
            return a;
        }

        // 根据当前分数获取特殊平台与普通平台的比例信息
        function getSpecialRatioInfo() {
            const s = score;
            if (s < 100) return { specialCount: 0, totalCount: 1 };      // 0:1
            if (s < 200) return { specialCount: 1, totalCount: 21 };     // 1:20
            if (s < 350) return { specialCount: 1, totalCount: 11 };     // 1:10
            if (s < 500) return { specialCount: 1, totalCount: 9 };      // 1:8
            if (s < 600) return { specialCount: 1, totalCount: 5 };      // 1:4
            if (s < 700) return { specialCount: 1, totalCount: 4 };      // 1:3
            if (s < 800) return { specialCount: 1, totalCount: 3 };      // 1:2
            if (s < 900) return { specialCount: 1, totalCount: 2 };      // 1:1
            if (s < 1000) return { specialCount: 2, totalCount: 3 };     // 2:1
            if (s < 1200) return { specialCount: 3, totalCount: 4 };     // 3:1
            if (s < 1400) return { specialCount: 5, totalCount: 6 };     // 5:1
            if (s < 1600) return { specialCount: 8, totalCount: 9 };     // 8:1
            if (s < 1800) return { specialCount: 10, totalCount: 11 };   // 10:1
            if (s < 2000) return { specialCount: 20, totalCount: 21 };   // 20:1
            return { specialCount: 1, totalCount: 1 };                   // 1:0
        }

        // 生成一个经过洗牌的分组数组（长度为 groupSize，包含符合比例的类型代码）
        function generateShuffledGroup() {
            const { specialCount, totalCount } = getSpecialRatioInfo();
            const group = [];
            
            const normalCount = totalCount - specialCount;
            for (let i = 0; i < normalCount; i++) group.push(1);
            
            const availableTypes = getAvailableSpecialTypes();
            if (availableTypes.length > 0 && specialCount > 0) {
                // 构建加权类型数组（基于当前权重）
                const weightedTypes = [];
                availableTypes.forEach(type => {
                    const weight = specialTypeWeights[type] || 1;
                    for (let i = 0; i < weight; i++) {
                        weightedTypes.push(type);
                    }
                });
                
                for (let i = 0; i < specialCount; i++) {
                    const randIdx = Math.floor(Math.random() * weightedTypes.length);
                    group.push(weightedTypes[randIdx]);
                }
            } else if (specialCount > 0) {
                for (let i = 0; i < specialCount; i++) group.push(1);
            }
            
            // 洗牌
            for (let i = group.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [group[i], group[j]] = [group[j], group[i]];
            }
            
            return group;
        }

        // 根据当前分数可用的特殊类型列表
        function getAvailableSpecialTypes() {
            const types = [];
            if (score >= 100) types.push(2); // 蓝色移动
            if (score >= 200) types.push(3); // 白色一次性
            if (score >= 500) types.push(4); // 深棕色移动一次性
            return types;
        }

        // 填充/追加平台类型队列
        function refillPlatformQueue() {
            const targetLength = Math.max(QUEUE_MIN_LENGTH, platformTypeQueue.length + 100);
            
            while (platformTypeQueue.length < targetLength) {
                const group = generateShuffledGroup();
                platformTypeQueue.push(...group);
            }
            
            lastQueueScore = score;
        }

        function random(min, max) {
        return Math.random() * (max - min) + min;
        }

        // 生成平台 (世界坐标y)
        function spawnPlatformAt(worldY) {
            // 分数区间变化超过阈值（30分）或队列过短时重建/补充队列
            if (Math.abs(score - lastQueueScore) > 30 || platformTypeQueue.length < 50) {
                if (Math.abs(score - lastQueueScore) > 30) {
                    specialTypeWeights = { 2: 1, 3: 1, 4: 1 };
                }
                refillPlatformQueue();
            }
            
            const typeCode = platformTypeQueue.shift();
            // 更新特殊类型权重（基于本次生成类型）
            updateSpecialTypeWeights(typeCode);
            
            const x = random(20, CONFIG.CANVAS_W - CONFIG.PLATFORM_W - 20);
            
            let type, color;
            switch (typeCode) {
                case 1: // 普通
                    type = PLATFORM_TYPE.FIXED;
                    color = '#4CAF50';
                    break;
                case 2: // 蓝色移动
                    type = PLATFORM_TYPE.MOVING;
                    color = '#2196F3';
                    break;
                case 3: // 白色一次性
                    type = PLATFORM_TYPE.ONETIME;
                    color = '#FFFFFF';
                    break;
                case 4: // 深棕色移动一次性
                    type = PLATFORM_TYPE.MOVING_ONETIME;
                    color = '#8B4513';
                    break;
                default:
                    type = PLATFORM_TYPE.FIXED;
                    color = '#4CAF50';
            }
            
            const platform = {
                x, y: worldY,
                width: CONFIG.PLATFORM_W, height: CONFIG.PLATFORM_H,
                type, color,
            };
            
            if (type === PLATFORM_TYPE.MOVING || type === PLATFORM_TYPE.MOVING_ONETIME) {
                setupMovingPlatform(platform);
            }
            
            platforms.push(platform);
            
            // 若队列再次变短，异步补充（避免阻塞）
            if (platformTypeQueue.length < QUEUE_MIN_LENGTH) {
                setTimeout(() => refillPlatformQueue(), 0);
            }
            
            return platform;
        }

        // 根据当前分数计算屏幕内陷阱允许的最小数量和最大数量
        function getTrapCountThresholds() {
            if (score < 800) return { min: 0, max: 0 };
            
            // 基础值：800分时上限1下限0
            let maxCount = 1;
            let minCount = 0;
            
            if (score >= 1000) {
                const extraScore = score - 1000;
                // 每200分上限+1，每400分下限+1
                maxCount = 1 + Math.floor(extraScore / 200);
                minCount = 0 + Math.floor(extraScore / 400);
            }
            
            // 限制最大值
            maxCount = Math.min(10, maxCount);
            minCount = Math.min(5, minCount);
            
            return { min: minCount, max: maxCount };
        }

        // 每帧或相机移动时调用，根据屏幕内陷阱数量决定是否生成新陷阱
        function updateTrapGeneration(timeScale) {
            if (gameState !== GAME_STATE.PLAYING) return;
            if (score < 800) return;

            // 冷却递减（基于时间缩放）
            if (trapSpawnCooldown > 0) {
                trapSpawnCooldown--;
                return;
            }

            // 计算屏幕范围内当前陷阱数量
            const screenTop = cameraY;
            const screenBottom = cameraY + CONFIG.CANVAS_H;
            const trapsOnScreen = traps.filter(t => 
                t.y >= screenTop && t.y <= screenBottom
            );
            const currentCount = trapsOnScreen.length;

            const { min, max } = getTrapCountThresholds();

            let shouldSpawn = false;
            if (currentCount < min) {
                shouldSpawn = true;
            } else if (currentCount < max) {
                const heightFactor = Math.min(1, (cameraY + CONFIG.CANVAS_H - screenTop) / 1000);
                const scoreFactor = Math.min(1, (score - 800) / 1200);
                const probability = 0.05 + 0.15 * heightFactor * scoreFactor;
                shouldSpawn = Math.random() < probability;
            }

            if (!shouldSpawn) return;

            let spawnY = cameraY - random(200, 400);
            let attempts = 0;
            const maxAttempts = 15;
            while (attempts < maxAttempts) {
                const tooClose = traps.some(t => Math.abs(t.y - spawnY) < 480);
                if (!tooClose) break;
                spawnY = cameraY - random(200, 400);
                attempts++;
            }
            if (attempts >= maxAttempts) return;

            const trapX = random(20, CONFIG.CANVAS_W - CONFIG.TRAP_SIZE - 20);
            traps.push({
                x: trapX,
                y: spawnY,
                width: CONFIG.TRAP_SIZE,
                height: CONFIG.TRAP_SIZE,
            });

            trapSpawnCooldown = TRAP_SPAWN_COOLDOWN_MAX;
        }

        // 更新世界生成
        function updateWorldGeneration() {
            const bottomWorldY = cameraY + CONFIG.CANVAS_H;
            while (nextPlatformY > cameraY - 200) {
                const newPlat = spawnPlatformAt(nextPlatformY);
                nextPlatformY -= random(CONFIG.PLATFORM_INTERVAL_MIN, CONFIG.PLATFORM_INTERVAL_MAX);
            }
        }

        //平台碰撞检测函数
        function checkMovingPathCollision(plat, moveRange) {
            const step = 8; // 步长稍小提高精度
            const startX = plat.x;
            const startY = plat.y;
            const halfW = CONFIG.PLATFORM_W / 2;
            const halfH = CONFIG.PLATFORM_H / 2;

            // 检测移动路径上的每个采样点
            for (let offset = -moveRange; offset <= moveRange; offset += step) {
                const checkX = startX + offset;
                // 检查该位置是否与任何其他平台重叠（使用矩形相交检测）
                const collides = platforms.some(other => {
                    if (other === plat) return false;
                    // 计算两矩形中心距离
                    const otherCenterX = other.x + other.width/2;
                    const otherCenterY = other.y + other.height/2;
                    const dx = Math.abs((checkX + halfW) - otherCenterX);
                    const dy = Math.abs((startY + halfH) - otherCenterY);
                    return dx < (CONFIG.PLATFORM_W/2 + other.width/2) && 
                        dy < (CONFIG.PLATFORM_H/2 + other.height/2);
                });
                if (collides) return true;
            }
            return false;
        }

        function setupMovingPlatform(plat) {
            // 强制左右移动
            const isHorizontal = true;
            let moveRange, attempts = 0;
            const maxAttempts = 15;

            do {
                moveRange = random(80, CONFIG.MAX_MOVING_RANGE_X);
                attempts++;
            } while (checkMovingPathCollision(plat, moveRange) && attempts < maxAttempts);

            if (attempts >= maxAttempts) {
                // 无法避免碰撞，降级为一次性平台（白色）
                plat.type = PLATFORM_TYPE.ONETIME;
                plat.color = '#FFFFFF';
                return;
                // 清除移动属性
                delete plat.moveRange;
                delete plat.moveSpeed;
                delete plat.startX;
                delete plat.startY;
                delete plat.dirX;
                delete plat.dirY;
                return;
            }

            plat.moveRange = moveRange;
            plat.moveSpeed = random(1.2, 2.5) * (Math.random() > 0.5 ? 1 : -1);
            plat.startX = plat.x;
            plat.startY = plat.y;
            plat.dirX = 1;
            plat.dirY = 0;
        }

        //道具生成
        function updateItemGeneration() {
            // 根据分数决定可生成的道具类型
            let availableTypes = [];
            if (score >= 50) availableTypes.push(ITEM_TYPE.JUMP_BOOST);
            if (score >= 100) availableTypes.push(ITEM_TYPE.FLIGHT);
            if (score >= 800) availableTypes.push(ITEM_TYPE.SHIELD);
            if (score >= 1000) availableTypes.push(ITEM_TYPE.LIFE_UP);

            if (availableTypes.length === 0) return;
            
            // 概率生成，每帧约0.5%概率
            if (Math.random() > 0.005) return;
            
            // 屏幕内最多2个道具
            const screenTop = cameraY;
            const screenBottom = cameraY + CONFIG.CANVAS_H;
            const itemsOnScreen = items.filter(it => it.y >= screenTop && it.y <= screenBottom);
            if (itemsOnScreen.length >= 2) return;

            // 获取世界坐标在相机上方 50~300 像素范围内的平台（提前生成，避免突然出现）
            const minY = cameraY - 300;
            const maxY = cameraY - 50;
            const candidatePlatforms = platforms.filter(p => {
                return p.y >= minY && p.y <= maxY &&
                       p.type !== PLATFORM_TYPE.ONETIME && p.type !== PLATFORM_TYPE.MOVING_ONETIME;
            });
            
            if (candidatePlatforms.length === 0) return;
            
            // 打乱候选平台顺序，避免总是选到第一个
            const shuffled = [...candidatePlatforms];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            // 找一个尚未附着道具的平台
            let targetPlat = null;
            for (const plat of shuffled) {
                const alreadyHasItem = items.some(it => it.attachedPlatform === plat);
                if (!alreadyHasItem) {
                    targetPlat = plat;
                    break;
                }
            }
            
            if (!targetPlat) return; // 所有候选平台都已附着道具
            
            // 随机道具类型（从可用类型中选）
            const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            
            // 计算道具位置：水平居中于平台，垂直位于平台上表面向下偏移5像素（即道具下边缘在平台顶部下方5px）
            const itemWidth = 36, itemHeight = 36;
            const spawnX = targetPlat.x + (targetPlat.width - itemWidth) / 2;
            const spawnY = targetPlat.y - itemHeight + 5;  // 道具下边缘在平台顶部下方5px
            
            // 创建道具，记录附着的平台引用（如果是移动平台则跟随）
            const newItem = {
                x: spawnX, y: spawnY,
                width: itemWidth, height: itemHeight,
                type: type,
                attachedPlatform: targetPlat  // 引用平台对象
            };
            
            items.push(newItem);
        }

        // 物理更新 & 碰撞
        function updateGame(deltaTime) {
            if (gameState !== GAME_STATE.PLAYING) return;

            // 因为传入的 deltaTime 已经是固定步长（16.67ms），所以 timeScale 恒为 1
            const timeScale = 1;

            // 平滑移动至目标X
            const dx = player.targetX - player.x;
            player.x += dx * CONFIG.PLAYER_SMOOTH_SPEED * timeScale;
            player.x = clamp(player.x, 0, CONFIG.CANVAS_W - player.width);

            // 道具2：向上冲刺计时器
            if (player.item2Flying) {
                player.item2Timer -= timeScale;
                if (player.item2Timer <= 0) {
                    player.item2Flying = false;
                }
            }

            /// 重力与飞行速度处理
            if (player.item2Flying) {
                // 飞行期间固定上升速度
                player.vy = -14;
            } else {
                // 正常重力
                player.vy += CONFIG.GRAVITY * timeScale;
                player.vy = Math.min(player.vy, CONFIG.MAX_FALL_SPEED);
            }
            player.y += player.vy * timeScale;

            // 无敌帧递减
            if (player.invincible > 0) {
                player.invincible -= timeScale;
                if (player.invincible < 0) player.invincible = 0;
            }

            // 道具3护盾计时
            if (player.item3Shield) {
                player.item3Timer -= timeScale;
                if (player.item3Timer <= 0) {
                    player.item3Shield = false;
                    player.item3BlinkPhase = 0;
                    player.item3BlinkTimer = 0;
                    player.item3BlinkShow = true;
                } else if (player.item3Timer <= 180 && player.item3BlinkPhase === 0) {
                    // 最后3秒开始闪烁
                    player.item3BlinkPhase = 1;
                    player.item3BlinkTimer = 0;
                    player.item3BlinkShow = true;
                }
                
                // 闪烁计时（仅在闪烁阶段）
                if (player.item3BlinkPhase === 1) {
                    player.item3BlinkTimer += deltaTime;
                    // 每3300毫秒切换一次显示状态（每秒3次）
                    if (player.item3BlinkTimer >= 330) {
                        player.item3BlinkShow = !player.item3BlinkShow;
                        player.item3BlinkTimer -= 330;
                    }
                }
            }

            // 移动平台更新
            platforms.forEach(p => {
                if (p.type !== PLATFORM_TYPE.MOVING && p.type !== PLATFORM_TYPE.MOVING_ONETIME) return;
                if (p.dirX !== 0) {
                    p.x += p.moveSpeed * p.dirX * timeScale;
                    let bounced = false;
                    if (p.x < 0) {
                        p.x = 0;
                        p.dirX *= -1;
                        bounced = true;
                    } else if (p.x + p.width > CONFIG.CANVAS_W) {
                        p.x = CONFIG.CANVAS_W - p.width;
                        p.dirX *= -1;
                        bounced = true;
                    }
                    if (bounced) {
                        p.startX = p.x;
                        const maxLeft = Math.max(0, p.startX - p.moveRange);
                        const maxRight = Math.min(CONFIG.CANVAS_W - p.width, p.startX + p.moveRange);
                        p.moveRange = Math.min(p.moveRange, Math.max(p.startX - maxLeft, maxRight - p.startX));
                    }
                    if (!bounced && Math.abs(p.x - p.startX) > p.moveRange) {
                        p.dirX *= -1;
                        p.x = clamp(p.x, p.startX - p.moveRange, p.startX + p.moveRange);
                    }
                }
            });

            // 让附着在移动平台上的道具跟随平台移动
            items.forEach(item => {
                if (item.attachedPlatform) {
                    const plat = item.attachedPlatform;
                    // 计算相对偏移（道具初始在平台中心上方5px处）
                    // 由于平台移动后位置改变，重新计算道具位置以保持相对关系
                    item.x = plat.x + (plat.width - item.width) / 2;
                    item.y = plat.y - item.height + 5;
                    
                    // 如果平台类型变为一次性且已被移除，解除附着
                    if (!platforms.includes(plat)) {
                        delete item.attachedPlatform;
                    }
                }
            });

            // 平台碰撞 - 使用碰撞箱
            if (player.vy >= 0) {
                const collisionBox = {
                    x: player.x + (CONFIG.PLAYER_W - CONFIG.PLAYER_COLLISION_W) / 2,
                    y: player.y,
                    w: CONFIG.PLAYER_COLLISION_W,
                    h: CONFIG.PLAYER_COLLISION_H
                };
                const playerBottom = collisionBox.y + collisionBox.h;
                for (let i = 0; i < platforms.length; i++) {
                    const p = platforms[i];
                    if (playerBottom >= p.y && playerBottom <= p.y + p.height + 10 && 
                        collisionBox.x + collisionBox.w > p.x && collisionBox.x < p.x + p.width) {
                        player.y = p.y - player.height;
                        // 跳跃初速度（注意：道具1已改为直接触发，不再使用item1Active）
                        player.vy = CONFIG.JUMP_FORCE;
                        // 落地时清除道具1的免疫状态（如果之前激活过）
                        player.jumpBoostImmune = false;
                        if (p.type === PLATFORM_TYPE.ONETIME || p.type === PLATFORM_TYPE.MOVING_ONETIME) {
                            platforms.splice(i, 1);
                            i--;
                        }
                        break;
                    }
                }
            }

            // 陷阱碰撞
            if (!player.item2Flying && !player.jumpBoostImmune && player.invincible <= 0) {
                const playerCollision = {
                    x: player.x + (CONFIG.PLAYER_W - CONFIG.PLAYER_COLLISION_W) / 2,
                    y: player.y + (CONFIG.PLAYER_H - CONFIG.PLAYER_COLLISION_H) / 2,
                    w: CONFIG.PLAYER_COLLISION_W,
                    h: CONFIG.PLAYER_COLLISION_H
                };
                for (let t of traps) {
                    if (rectTriangleCollide(playerCollision, t)) {
                        player.vy = -player.vy * 0.8;
                        player.vx = -player.vx * 0.5;
                        
                        // 护盾抵挡一次伤害
                        if (player.item3Shield) {
                            player.item3Shield = false;
                            player.item3Timer = 0;
                            player.item3BlinkPhase = 0;
                            player.invincible = CONFIG.INVINCIBLE_DURATION;
                        } else {
                            player.lives = Math.max(0, player.lives - CONFIG.TRAP_DAMAGE);
                            player.invincible = CONFIG.INVINCIBLE_DURATION;
                            if (player.lives <= 0) {
                                gameState = GAME_STATE.GAMEOVER;
                                gameOverReason = 'life';
                            }
                        }
                        break;
                    }
                }
            }

            // 道具碰撞检测
            const playerColl = {
                x: player.x + (CONFIG.PLAYER_W - CONFIG.PLAYER_COLLISION_W) / 2,
                y: player.y + (CONFIG.PLAYER_H - CONFIG.PLAYER_COLLISION_H) / 2,
                w: CONFIG.PLAYER_COLLISION_W,
                h: CONFIG.PLAYER_COLLISION_H
            };
            for (let i = items.length - 1; i >= 0; i--) {
                const it = items[i];
                if (rectCollide(playerColl, it)) {
                    // 类型1（跳跃加倍）：触碰瞬间直接向上加速跳跃
                    if (it.type === 1) {
                        player.vy = CONFIG.JUMP_FORCE * 1.5;  // 给予1.5倍跳跃初速度
                        player.y = it.y - player.height;
                        player.jumpBoostImmune = true;        // 激活免疫
                        items.splice(i, 1);
                        continue;
                    }
                    
                    // 其他道具正常触发
                    switch (it.type) {
                        case 2:
                            player.item2Flying = true;
                            player.item2Timer = 180;
                            break;
                        case 3:
                            player.item3Shield = true;
                            player.item3Timer = 720;
                            player.item3BlinkPhase = 0;
                            player.item3BlinkTimer = 0;
                            player.item3BlinkShow = true;
                            break;
                        case 4:
                            player.lives = Math.min(5, player.lives + 1);
                            break;
                    }
                    items.splice(i, 1);
                }
            }

            // 掉落死亡
            if (player.y - cameraY > CONFIG.CANVAS_H + 100) {
                gameState = GAME_STATE.GAMEOVER;
                gameOverReason = 'fall';
            }

            // 相机滚动
            const screenY = player.y - cameraY;
            if (screenY < CONFIG.SCROLL_THRESHOLD) {
                cameraY = player.y - CONFIG.SCROLL_THRESHOLD;
            }

            // 更新最高点与分数
            const worldPlayerY = player.y;
            if (worldPlayerY < highestY) {
                const diff = highestY - worldPlayerY;
                score += diff / 10;                         // 改为浮点数累加
                highestY = worldPlayerY;
                
                const prevInterval = Math.floor(lastQueueScore / 50);
                const currInterval = Math.floor(score / 50); // score 现在是浮点数，floor 后仍正确
                if (prevInterval !== currInterval) {
                    platformTypeQueue = [];
                    specialTypeWeights = { 2: 1, 3: 1, 4: 1 };
                    refillPlatformQueue();
                }
            }

            // 移除屏幕外下方平台/陷阱
            const removeBuffer = 15;
            platforms = platforms.filter(p => p.y - cameraY < CONFIG.CANVAS_H + removeBuffer);
            traps = traps.filter(t => t.y - cameraY < CONFIG.CANVAS_H + removeBuffer);
            items = items.filter(it => it.y - cameraY < CONFIG.CANVAS_H + removeBuffer);

            // 继续生成
            updateWorldGeneration();

            // 胜利检测
            if (!continueMode && !victoryTriggered && score >= CONFIG.WIN_SCORE) {
                victoryTriggered = true;
                gameState = GAME_STATE.VICTORY;
                updateDisplay(); // 确保 UI 更新到最新分数/评级
                return;          // 立即停止物理更新，防止后续生成干扰
            }

            // 陷阱生成（传入时间缩放）
            updateTrapGeneration();

            updateItemGeneration();

            updateDisplay();
        }

        function adjustBrightness(hex, percent) {
            // 简化：直接返回原色或稍暗，用于渐变
            let R = parseInt(hex.substring(1,3), 16);
            let G = parseInt(hex.substring(3,5), 16);
            let B = parseInt(hex.substring(5,7), 16);
            R = Math.min(255, Math.max(0, R * percent));
            G = Math.min(255, Math.max(0, G * percent));
            B = Math.min(255, Math.max(0, B * percent));
            return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
        }

        function updateDisplay() {
            lifeDisplay.textContent = player.lives;
            const intScore = Math.floor(score);
            scoreDisplay.textContent = intScore;
            const percent = Math.min(100, (score / CONFIG.WIN_SCORE) * 100);
            const progressBar = document.getElementById('scoreProgressBar');
            const progressContainer = document.getElementById('progressBarContainer');
            const ratingDisplay = document.getElementById('ratingDisplay');
            
            progressBar.style.width = percent + '%';
            
            // 获取评级信息
            const { rating, color } = calculateRating(score);
            ratingDisplay.textContent = rating;
            ratingDisplay.className = ''; // 清除所有类
            ratingDisplay.classList.add(`rating-${rating}`);
            // 非 S/SS/SSS 时确保移除动画残留
            if (!['S', 'SS', 'SSS'].includes(rating)) {
                ratingDisplay.style.animation = 'none';
            } else {
                ratingDisplay.style.animation = ''; // 恢复CSS定义的动画
            }
            ratingDisplay.style.color = color;
            
            // 进度条颜色及描边
            progressBar.style.background = `linear-gradient(90deg, ${color}, ${adjustBrightness(color, 0.7)})`;
            progressContainer.style.borderColor = color;
        }

        // ---------- 渲染 ----------
        function draw() {
            ctx.clearRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);
            
            // 绘制平台
            platforms.forEach(p => {
                const screenY = p.y - cameraY;
                ctx.beginPath();
                ctx.roundRect(p.x, screenY, p.width, p.height, CONFIG.PLATFORM_RADIUS);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.lineWidth = CONFIG.STROKE_WIDTH;
                ctx.strokeStyle = '#1e2b3c';
                ctx.stroke();
            });
            
            // 绘制陷阱
            const trapImg = trapFrame === 0 ? trapImage1 : trapImage2;
            const trapSize = CONFIG.TRAP_SIZE;

            traps.forEach(t => {
                const screenY = t.y - cameraY;
                // 检查图片是否已加载完成且宽度大于0
                const trapImgValid = isImageValid(trapImg);
                traps.forEach(t => {
                    const screenY = t.y - cameraY;
                    if (trapImgValid) {
                        ctx.drawImage(trapImg, t.x, screenY, trapSize, trapSize);
                    } else {
                        ctx.fillStyle = '#F44336';
                        ctx.beginPath();
                        ctx.rect(t.x, screenY, trapSize, trapSize);
                        ctx.fill();
                        ctx.strokeStyle = '#b71c1c';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                });
            });

            // 绘制道具
            items.forEach(it => {
                const screenY = it.y - cameraY;
                const img = itemImages[it.type];
                if (isImageValid(img)) {
                    ctx.drawImage(img, it.x, screenY, it.width, it.height);
                } else {
                    const colorMap = {
                        [ITEM_TYPE.JUMP_BOOST]: '#FFD700',
                        [ITEM_TYPE.FLIGHT]: '#00BFFF',
                        [ITEM_TYPE.SHIELD]: '#32CD32',
                        [ITEM_TYPE.LIFE_UP]: '#FF69B4'
                    };
                    ctx.fillStyle = colorMap[it.type] || '#FFF';
                    ctx.fillRect(it.x, screenY, it.width, it.height);
                }
            });

            // 绘制玩家
            const screenPlayerY = player.y - cameraY;

            // 判断移动方向：若 targetX 大于当前 x，则向右移动；否则向左移动
            const movingRight = player.targetX >= player.x;

            // 选择当前应使用的玩家贴图
            let currentPlayerImage = playerImage;
            if (player.item2Flying) {
                // 道具2效果：向上冲刺，使用指定贴图
                currentPlayerImage = playerItem2Image;
            } else if (player.item3Shield) {
                // 道具3效果：护盾
                if (player.item3BlinkPhase === 1) {
                    // 闪烁阶段：根据计时器状态切换
                    currentPlayerImage = player.item3BlinkShow ? playerItem3Image : playerImage;
                } else {
                    currentPlayerImage = playerItem3Image;
                }
            }

            const validImage = isImageValid(currentPlayerImage) && !imageLoadFailed;
            if (validImage) {
                ctx.save();
                if (player.invincible > 0 && (Math.floor(Date.now() / 100) % 2 === 0)) {
                    ctx.globalAlpha = 0.5;
                }
                if (!movingRight) {
                    ctx.translate(player.x + player.width, screenPlayerY);
                    ctx.scale(-1, 1);
                    ctx.drawImage(currentPlayerImage, 0, 0, player.width, player.height);
                } else {
                    ctx.drawImage(currentPlayerImage, player.x, screenPlayerY, player.width, player.height);
                }
                ctx.restore();
            } else {
                // 占位绘制（同样支持镜像）
                ctx.fillStyle = '#FFB74D';
                if (!movingRight) {
                    ctx.save();
                    ctx.translate(player.x + player.width, screenPlayerY);
                    ctx.scale(-1, 1);
                    ctx.fillRect(0, 0, player.width, player.height);
                    ctx.restore();
                } else {
                    ctx.fillRect(player.x, screenPlayerY, player.width, player.height);
                }
            }

            // 无敌闪烁不额外处理
        }

        // 游戏循环
        function gameTick(now) {
            requestAnimationFrame(gameTick);

            if (lastTimestamp === 0) {
                lastTimestamp = now;
                return;
            }

            let deltaTime = Math.min(100, now - lastTimestamp); // 限制最大单帧时长
            lastTimestamp = now;
            accumulator += deltaTime;

            // 固定时间步长更新物理
            while (accumulator >= FIXED_TIMESTEP) {
                if (gameState === GAME_STATE.PLAYING) {
                    updateGame(FIXED_TIMESTEP); // 注意：传入固定步长，而不是 deltaTime
                }
                accumulator -= FIXED_TIMESTEP;
            }

            // 更新陷阱动画（基于真实时间）
            if (now - lastTrapFrameTime > TRAP_FRAME_INTERVAL) {
                trapFrame = trapFrame === 0 ? 1 : 0;
                lastTrapFrameTime = now;
            }

            draw();

            // 状态处理（只在物理更新后触发一次）
            if (gameState === GAME_STATE.GAMEOVER) {
                showGameover();
            } else if (gameState === GAME_STATE.VICTORY) {
                showVictory();
            }
        }

        // ---------- UI 控制 ----------
        function hideAllOverlays() {
            mainMenuOverlay.classList.add('hidden');
            recordOverlay.classList.add('hidden');
            aboutOverlay.classList.add('hidden');
            victoryOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            pauseBadge.classList.remove('show');
        }

        function showMainMenu() {
            hideAllOverlays();
            mainMenuOverlay.classList.remove('hidden');
            gameFooter.style.display = 'none';
            gameHUD.style.display = 'none';
            pauseBadge.classList.remove('show');
            pauseToggleBtn.textContent = '暂停';   // 重置暂停按钮文字
            gameState = GAME_STATE.MENU;
            updateFooterButtonsState();
        }

        function startNewGame() {
            resetGame();
            hideAllOverlays();
            gameFooter.style.display = 'flex';
            gameHUD.style.display = 'flex';
            pauseToggleBtn.textContent = '暂停';
            pauseBadge.classList.remove('show');
            gameState = GAME_STATE.PLAYING;
            updateFooterButtonsState();
        }

        function pauseGame() {
            if (gameState === GAME_STATE.PLAYING) {
                gameState = GAME_STATE.PAUSED;
                pauseToggleBtn.textContent = '继续';
                pauseBadge.classList.add('show');
            } else if (gameState === GAME_STATE.PAUSED) {
                gameState = GAME_STATE.PLAYING;
                pauseToggleBtn.textContent = '暂停';
                pauseBadge.classList.remove('show');
            }
            updateFooterButtonsState();
        }

        function showVictory() {
            // 防止重复展示
            if (victoryShown) return;
            victoryShown = true;

            hideAllOverlays();
            victoryOverlay.classList.remove('hidden');
            document.getElementById('victoryScore').textContent = Math.floor(score);
            gameFooter.style.display = 'none';
            gameHUD.style.display = 'none';
        }

        function showGameover() {
            if (!gameRecorded) {
                addPlayRecord(score);
                gameRecorded = true;
            }
            hideAllOverlays();
            gameoverOverlay.classList.remove('hidden');
            document.getElementById('gameoverScore').textContent = Math.floor(score);
            gameFooter.style.display = 'none';
            gameHUD.style.display = 'none';
        }

        // 更新游戏内底部按钮的可用状态样式
        function updateFooterButtonsState() {
            const recordBtn = document.getElementById('gameRecordBtn');
            const aboutBtn = document.getElementById('gameAboutBtn');
            const isPaused = (gameState === GAME_STATE.PAUSED);
            
            if (isPaused) {
                recordBtn.classList.remove('disabled');
                aboutBtn.classList.remove('disabled');
            } else {
                recordBtn.classList.add('disabled');
                aboutBtn.classList.add('disabled');
            }
        }

        // 继续游戏 (通关后)
        function continueAfterVictory() {
            continueMode = true;
            victoryTriggered = false;
            victoryShown = false;
            hideAllOverlays();
            gameFooter.style.display = 'flex';
            gameHUD.style.display = 'flex';
            gameState = GAME_STATE.PLAYING;
            updateFooterButtonsState();
        }

        // ---------- 事件绑定 ----------
        function handleDragStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const canvasX = (clientX - rect.left) * (CONFIG.CANVAS_W / rect.width);
            player.targetX = clamp(canvasX - player.width/2, 0, CONFIG.CANVAS_W - player.width);
            isDragging = true;
        }

        function handleDragMove(e) {
            if (!isDragging || gameState !== GAME_STATE.PLAYING) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const canvasX = (clientX - rect.left) * (CONFIG.CANVAS_W / rect.width);
            player.targetX = clamp(canvasX - player.width/2, 0, CONFIG.CANVAS_W - player.width);
        }

        function handleDragEnd(e) {
            e.preventDefault();
            isDragging = false;
        }

        // 从记录/关于返回游戏（保持暂停状态）
        function returnToGame() {
            hideAllOverlays();
            gameFooter.style.display = 'flex';
            gameHUD.style.display = 'flex';
            pauseBadge.classList.add('show');      // 显示暂停图标
            pauseToggleBtn.textContent = '继续';
            gameState = GAME_STATE.PAUSED;         // 确保状态为暂停
            updateFooterButtonsState();
        }

        // 初始化事件
        function bindEvents() {
            // 拖拽/鼠标事件
            canvas.addEventListener('touchstart', handleDragStart, { passive: false });
            canvas.addEventListener('touchmove', handleDragMove, { passive: false });
            canvas.addEventListener('touchend', handleDragEnd);
            canvas.addEventListener('mousedown', handleDragStart);
            window.addEventListener('mousemove', (e) => { if (isDragging) handleDragMove(e); });
            window.addEventListener('mouseup', handleDragEnd);

            // ========== 主菜单按钮 ==========
            document.getElementById('startBtn').onclick = startNewGame;
            document.getElementById('recordBtn').onclick = () => {
                hideAllOverlays();
                recordOverlay.classList.remove('hidden');
                renderRecordTable();
                // 从主菜单进入记录时，如果在游戏中则暂停（可选）
                if (gameState === GAME_STATE.PLAYING) pauseGame();
            };
            document.getElementById('aboutBtn').onclick = () => {
                hideAllOverlays();
                aboutOverlay.classList.remove('hidden');
                if (gameState === GAME_STATE.PLAYING) pauseGame();
            };

            // ========== 游戏内底部按钮 ==========
            pauseToggleBtn.onclick = pauseGame;

            // 游戏内“记录”按钮：仅暂停时可点击
            document.getElementById('gameRecordBtn').onclick = () => {
                if (gameState !== GAME_STATE.PAUSED) return;  // 非暂停不响应
                hideAllOverlays();
                recordOverlay.classList.remove('hidden');
                renderRecordTable();
                // 保持暂停状态，不调用 pauseGame
            };

            // 游戏内“关于”按钮：仅暂停时可点击
            document.getElementById('gameAboutBtn').onclick = () => {
                if (gameState !== GAME_STATE.PAUSED) return;
                hideAllOverlays();
                aboutOverlay.classList.remove('hidden');
            };

            // ========== 关于页面的作者按钮 ==========
            document.getElementById('authorLinkBtn').onclick = () => {
                window.open('https://space.bilibili.com/18693619', '_blank');
            };

            // ========== 关闭/返回按钮（区分来源） ==========
            // 注意：这些按钮在“记录”和“关于”弹窗中，需根据游戏状态决定返回哪里
            // 我们使用一个统一的处理函数
            const handleBackFromOverlay = () => {
                if (gameState === GAME_STATE.PAUSED) {
                    // 如果当前是暂停状态，返回游戏暂停界面
                    returnToGame();
                } else {
                    // 否则返回主菜单
                    showMainMenu();
                }
            };

            document.getElementById('closeRecordBtn').onclick = handleBackFromOverlay;
            document.getElementById('backFromRecordBtn').onclick = handleBackFromOverlay;
            document.getElementById('closeAboutBtn').onclick = handleBackFromOverlay;
            document.getElementById('backFromAboutBtn').onclick = handleBackFromOverlay;

            // ========== 通关/结束弹窗按钮 ==========
            document.getElementById('continueBtn').onclick = continueAfterVictory;
            document.getElementById('restartFromVictoryBtn').onclick = () => {
                // 记录本次通关分数（如果尚未记录）
                if (!gameRecorded) {
                    addPlayRecord(score);
                    gameRecorded = true;
                }
                startNewGame();
            };
            document.getElementById('backFromVictoryBtn').onclick = () => {
                // 记录本次通关分数（如果尚未记录）
                if (!gameRecorded) {
                    addPlayRecord(score);
                    gameRecorded = true;
                }
                showMainMenu();
            };

            // 游戏结束弹窗按钮
            document.getElementById('restartFromOverBtn').onclick = () => {
                // 记录分数（在 showGameover 中已经记录过一次，但以防万一）
                if (!gameRecorded) {
                    addPlayRecord(score);
                    gameRecorded = true;
                }
                startNewGame();
            };
            document.getElementById('backFromOverBtn').onclick = () => {
                if (!gameRecorded) {
                    addPlayRecord(score);
                    gameRecorded = true;
                }
                showMainMenu();
            };
        }

        // 启动
        function init() {
            if (!canvas.getContext) return;
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
            
            loadResources();
            resetGame();
            bindEvents();
            gameLoopId = requestAnimationFrame(gameTick);
            renderRecordTable();
            showMainMenu();
        }

        init();
    })();
</script>
